[syjobber.11935391692181012391]
description = "Das Wetterfenster, um von Miami auf die Bahamas zu segeln, war alles andere als ideal. Wir hatten die Lage schon einige Zeit beobachtet und da Johanna nur gute zwei Wochen Zeit hatte und sie von Georgetown (Great Exuma Island) wieder nach Deutschland fliegen würde, mussten wir direkt am Tag nach ihrer Ankunft, am 24.12. starten, denn die Bedingungen wurden nach hinten raus immer schlechter. Der ursprüngliche Plan, nach Bimini zu segeln ging nicht auf, da der Wind aus genau der Richtung kam, also schlugen wir einen großen und ein paar kleine Haken nach Norden, wobei uns der Golfstrom in diese Richtung schob. Chrischan war mit seinen Besuchern schon einen Tag früher nachmittags gestartet, hatte sich aber eine Ankerbucht gesucht, weil es seinen Gästen nicht so gut ging. Wir zirkelten also aus Miami raus auf den Atlantik. Die See war sehr holprig und wir hatten eine Nachtfahrt vor uns, nicht das klassische Heiligabendprogramm. Weil Kochen bei der unruhigen See keine Option war, gab es eine Dose Ravioli. Thomas stürzte bei einer fiesen seitlichen Welle mit der Schale Ravioli gegen den Navitisch, zog sich eine heftige Prellung zu und die Tomatenauce verteilte sich großflächig unter Deck und bis unter die Decke des Deckshauses … Frohe Weihnachten!"
id = "11935391692181012391"
timestamp = 1768780800
title = "Familienfeiertage auf den Bahamas"
url = "https://www.sy-jobber.de/2026/01/19/familienfeiertage-auf-den-bahamas/"

[syjobber.1773633027066152662]
description = "Wir genossen die Zeit in der Marina Puerto Bahia in der Dominikanischen Republik in vollen Zügen … eine Dusche, eine Nacht ohne Geschaukel und das Knüpfen von neuen Kontakten. Wir lernten die deutsche Crew der ZAPOLI (Outremer - Katamaran) kennen, Baron und Baronin von Bilderling und verbrachten zwei interessante Abende zusammen … vom Boot her, eine komplett andere Liga als unser altes Boot, aber doch sehr ähnliche Themen. Beim Frühstück im Restaurant lernten wir Ruth aus Kentucky kennen, die hier in der Dominikanischen Republik ehrenamtlich Unterricht für aus- und inländische Kinder gab. Es dauerte fast 2 Stunden, bis unsere Bestellung kam … in der Karibik braucht man manchmal etwas mehr Geduld als woanders. Das galt auch für die Laundry … die Aktion mit zwei Waschmaschinen und zwei Trocknern dauerte schonmal fast einen ganzen Tag. Man stand in der Warteschleife … hatte endlich eine Maschine … die funktionierte dann nicht … man wartete auf die Andere … auch da ist Geduld gefragt! Wir nutzten die Gelegenheit, Süßwasser am Steg zu haben und spülten Jobber gründlich ab, um sie vom Salz zu befreien und entrosteten wieder mal die Edelstahlbeschläge an Deck … dass Edelstahl nicht rostet, ist wohl ein schönes Märchen. Wir verbrachten einen halben Tag mit Papierkram … dem neuerlichen Vermieten unseres Hauses, da der jetzige Mieter leider früher ausziehen möchte … dem Reservieren eines Liegeplatzes für Jobber im Winter 26/27 … und so dies und das. Die Neuvermietung lief nicht so gut, wir bekamen Anfragen von Maklern, die unser Haus kaufen wollten und von 10 – köpfigen Familien, die eine langfristige Lösung suchten … nicht das, was wir uns vorgestellt hatten. Am zweiten Tag in der Marina kam Toni zu unserem Nachbarboot, um sämtliche Edelstahlteile zu polieren. Thomas kam mit ihm ins Gespräch, verhandelte ein bisschen und buchte ihn für den kommenden Tag. Wir verlängerten unseren Aufenthalt in der Marina um einen Tag und warteten am nächsten Morgen auf Toni, der aber nicht auftauchte. Wir fragten verschiedene Marinaarbeiter, ohne Erfolg. Irgendwann gegen Mittag erschien Toni, „my friend“ und erklärte uns, wir hätten ihn ja zum Polieren gebucht und nicht für den ganzen Tag. Er verschwand wieder, kam mit einem Kumpel zurück und die beiden machten sich, mit Zahnbürste und Poliermittel in der Ketchup-Flasche an die Arbeit. Sie waren superfleißig, total gut drauf, sangen viel und hatten sich stundenlang etwas zu erzählen in der prallen Sonne, was den Skipper sehr verblüffte. „Über was reden die den ganzen Tag?“ Keine Ahnung ... dafür reichte mein Spanisch nicht. Wir versorgten sie mit kalten Getränken, einem Trinkgeld über den vereinbarten Betrag hinaus und abends waren sie fertig und alles blitzte."
id = "1773633027066152662"
timestamp = 1773878400
title = "Mit dem Buddyboot nach Puerto Rico"
url = "https://www.sy-jobber.de/2026/03/19/mit-dem-buddyboot-nach-puerto-rico/"

[syjobber.6479441525200840643]
description = "Nachdem Johanna uns in Georgetown (Great Exuma Island) verlassen hatte und auf dem Heimweg war, gingen wir erstmal einkaufen. Das Angebot im Supermarkt war mehr als überschaubar, die Obst-und Gemüsetheke war so gut wie leer bis auf ein paar müde Salatköpfe für etwa 13 Dollar pro Stück. Dafür gab es Eier in größeren Mengen und zu einem annehmbaren Preis. In der Karibik hatten wir uns angewöhnt, zu kaufen was das Angebot hergibt … das ist meistens nicht das, was auf dem Zettel steht … Flexibilität ist also gefragt. Vor der Käsetheke trafen wir die deutsche Crew der HUI-HUI und verabredeten uns für die nächsten Tage mal. Der Rückweg mit dem Dinghi war etwas spannend, denn unser, sonst zuverlässige, Tohatsu Außenborder zickte schon wieder und wir kamen auf der letzten Rille zum Boot zurück. Darum würden wir uns wohl zeitnah kümmern müssen, denn ohne Beiboot wären wir auf Jobber gefangen und nicht mehr mobil. Wir gingen wieder zurück auf unseren alten Ankerplatz im Schutz von Stocking Island, wo es weniger Wellen gab. Wir ankerten in der Nähe von zwei deutschen Katamaranen, der HUI-HUI und der MOMO … eine Seltenheit inmitten des Ankerfeldes mit 70 % Kanadiern und 29 % Amerikanern. Neben Aufräumen und Waschen stand also die Reparatur des Außenborders auf dem Programm. Da verunreinigter Sprit wohl nicht das Problem war, begab sich der Skipper auf Fehlersuche. Abends bekamen wir deutschen Besuch der beiden Katamarane auf ein Bier und Erfahrungsaustausch. Schön, wenn man sich in der Muttersprache verständigen kann … Englisch geht mittlerweile auch sehr gut, ist aber anstrengender. Die nächsten Tage vergingen mit Besuchen in der Chat`n Chill Bar und bei den Mitseglern. Ein Katamaran ist schon eine völlig andere Liga, was das Platzangebot und den Lebensraum angeht, wie wir wieder einmal feststellen mussten. Bei der inneren Fragestellung, ob wir lieber einen Katamaran hätten, schüttelten wir beide, bei allen Vorteilen, aber innerlich den Kopf. Wir lieben unsere Jobber und fühlen uns sicher bei schwerem Wetter. Den Tornado an der Ostküste der USA hätten wir in einem Katamaran sicher nicht so gut überstanden. Nächster Schritt auf der Fehlersuche beim Außenborder war der Klassiker, das Zerlegen und Reinigen des Vergasers. Wir nahmen den Motor an Bord, damit keine Kleinteile auf nimmer Wiedersehen ins Wasser fallen. Die MOMO lieh uns freundlicherweise ihrem Ultraschallreiniger. Leider stellte sich heraus, dass der Motor mit blitzblankem Vergaser immer noch nicht rund lief. Er sprang an und ging immer gleich wieder aus … vielleicht hing es mit der Spritzufuhr zusammen, also mit der Benzinpumpe. Nach mehrmaligem Zerlegen der Pumpe lief unser Tohatsu wieder … wieso auch immer, ein Fehler ließ sich nicht wirklich feststellen."
id = "6479441525200840643"
timestamp = 1772323200
title = "Bye-Bye Bahamas – Hola Dominikanische Republik"
url = "https://www.sy-jobber.de/2026/03/01/bye-bye-bahamas-hola-dominikanische-republik/"

[sypicaroon.15613077328284721187]
description = "Wie bereits in 2021 ging es bei schönstem Segelwetter gegen Mittag von der Marina Rubicon auf Lanzarote los und schon nach ein paar Meilen bekamen wir Besuch von einzelnen Delfinen und einer Schule Pilotwalen. Für die ersten 3 Stunden lief der Motor unterstützend mit. Dann ging es mit Groß, Genua und Kuttersegel in die erste Nacht. Als der Wind zeitweise auf 5 bft. auffrischte habe ich sicherheitshalber ein erstes Reff ins Groß gebunden, die Genua eingerollt und die Fock nach Stb. ausgebaumt. Die Aries Windsteueranlage funktioniert nach der Reparatur in Tazacorte wieder tadellos. Leider hatte ich oftmals in Unwissenheit die Gelenke und das Pendelruder mit mineralischem WD40 Öl behandelt. Dadurch sind die Teflonbuchsen im Pendelrohr aufgequollen und alles ging nur noch sehr schwergängig. Bei leichtem Wind ist das Schiff in Folge dessen immer wieder aus dem Ruder gelaufen. Bis auf ein paar ziemlich dichte Begegnungen mit der Berufsschiffart verlief die Nacht bei leichtem Wind aus NE entspannt und ich konnte im 20 min. Intervall etwas Schlaf bekommen. Am späten Vormittag hatten wir die NE Spitze von Teneriffa querab und der Wind frischte wieder etwas auf. Das Reff im Groß hatte ich bereits früh am Morgen ausgeschüttelt, was sich im Nachhinein aber als Fehler herausstellte. Auf dem Weg zur NW Spitze baute sich eine hohe Windsee aus NE auf, die im 90 grad Winkel gegen die lange Dünung aus NW auflief. Die Folge war mal wieder eine unangenehme Kreuzsee. Nach einzelnen Boen von bis zu 38 Ktn. entschloß ich mich viel zu spät, wieder ein Reff ins Groß zu binden. Die Fock war weiterhin nach Stb. ausgebaumt. Durch die zu große Segelfläche im Groß hatte die Aries bereits Schwierigkeiten den Kurs zu halten. Also ging es angeleint aufs Vorschiff und es wurde gerefft. Als es bereits dunkel war rundeten wir die NW Spitze und nach weiteren 2 Stunden war der Wind wie angekündigt schlagartig weg. Die restliche Nacht verbrachten wir im Geschaukel unter Motor. Da wir erst gegen Mittag in den Hafen konnten haben wir noch eine Runde bis nach Vueltas gedreht ind vergeblich versucht einen Fisch fürs Abendessen zu fangen. Das Einlaufen in den Hafen von San Sebastian fühlte sich für mich wie ein Nachhausekommen an. Hier gefällt es mir immer noch am Besten und ich werde voraussichtlich wieder eine lange Zeit auf der schönen Insel verbringen."
id = "15613077328284721187"
timestamp = 1678752000
title = "Westwärts nonstop nach Gomera"
url = "https://www.sy-picaroon.de/2023/03/14/westw%C3%A4rts-nonstop-nach-gomera/"

[sypicaroon.16743432544381412501]
description = "Von Pasito Blanco nach Morro Jable Gegen Mittag sind wir wir zuerst nach Norden an der Küste hochgefahren um einen besseren Windwinkel nach Fuerteventura zu bekommen. Da wir noch bei Tageslicht auf dem Ankerplatz unterhalb der Kirche von Morro Jable eintreffen wollten, planten wir einen Ankerstopp in der Bahia de Arinaga. Hier liegt man hinter einer großen Industriemole sehr geschützt gegen den Atlantikschwell aber nicht frei von starker Geruchsbelästigung durch ein naheliegendes Klärwerk. Martina und Jens von der Maje hatten die gleiche Idee und so konnten wir die morgige Überfahrt gemeinsam angehen. Am nächsten Morgen ging es sehr früh Ankerauf und erstmal Kurs NE um weitere Höhe gutzumachen. Dann im rechten Winkel durch das Verkehrstrennungsgebiet und wieder etwas angeluft auf direkten Kurs zur Südspitze von Fuerteventura. Da ich auf die starken Fallwinde durch meine letzte Ansteuerung vorgewarnt war, fiel das Großsegel bereits als der Leuchturm querab lag. Der Motor meldete jedoch nach kurzer Laufzeit eine Überhitzung und wurde sofort abgeschaltet. Das Schiff wurde mit gereffter Genua und Autopilot auf Kurs gehalten und ich begab mich unter Deck, um die Ursache zu ergründen. Den Impeller der Wasserpumpe hatte ich vor 2 Jahren gewechselt und vor der Abfahrt auf La Palma nochmal kontrolliert. Nun hatte sich eine Flunke gelöst und in der Saugleitung festgesetzt. Natürlich pünktlich mitten in den schönsten Fallwinden. Die Instandsetzung nahm dann gefühlte 2 Stunden in Anspruch und wir kamen mit dem letzten Tageslicht am Ankerplatz an. Die folgenden Ankertage verbrachten wir mir langen Strandwanderungen und genossen die erstklassigen Fischgerichte der örtlichen Gastronomie. Einzig die immer stärker werdende Dünung und die akrobatischen Einlagen beim Anlanden und Ablegen mit dem Dingy verhinderten eine längere Aufenthaltsdauer. Nun lockt uns die Marina Rubicon auf Lanzarote, wo ein längerer Aufenthalt geplant ist."
id = "16743432544381412501"
timestamp = 1678320000
title = "Von Pasito Blanco nach Morro Jable"
url = "https://www.sy-picaroon.de/2023/03/09/von-pasito-blanco-nach-morro-jable/"

[sypicaroon.5780778972941526711]
description = "Während ich diese Zeilen schreibe befinde ich mich auf hoher See in Richtung Madeira mit dem Ziel Porto Santo, der kleinen Nachbarinsel im Nordosten des Archipels. Nach nunmehr 3 Jahren auf den Kanaren ist ein Tapetenwechsel überfällig gewesen. Mit etwas Wehmut habe ich in San Sebastian auf La Gomera die Leinen gelöst und mich nach einem kurzen Stopp auf La Palma auf den Weg gemacht. So langsam wachsen auch die Seebeine wieder, die die letzten Monate etwas zu kurz gekommen sind. Das anfängliche Übelsein ist nun wieder der Freude am Segeln gewichen. Auch an den Wach-u. Schlafrythmus des Einhandseglers habe ich mich schnell wieder gewöhnt. Einzig die Bedenken bezüglich der Orca Attacken an der Portugiesischen Küste sind noch im Kopf und verursachen ein Unbehagen hinsichtlich der weiteren Etappe der Überfahrt zum Festland. Der aktuelle Plan lautet, auf Porto Santo auf ein sicheres Wetterfenster zur Weiterfahrt an die Algarve zu warten. Dort soll die Picaroon für den Sommer an Land gestellt werden. Im Herbst geht es dann weiter in Richtung Andalusien und vielleicht auch ins Mittelmeer."
id = "5780778972941526711"
timestamp = 1710633600
title = "Abschied von den Kanaren"
url = "https://www.sy-picaroon.de/2024/03/17/abschied-von-den-kanaren/"

